services:
  db:
    image: mysql:8.0
    container_name: proyecto2_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
      - ./db/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./db/02_datos_prueba.sql:/docker-entrypoint-initdb.d/02_datos_prueba.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network
    profiles: [app]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proyecto2_backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      PORT: ${BACKEND_PORT}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: ${NODE_ENV}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5174}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
    profiles: [app]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: proyecto2_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - app_network
    profiles: [app]
  
  lint:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: proyecto2_lint
    command: npm run lint
    profiles: [lint]
    networks:
      - app_network 

  test:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: proyecto2_test
    command: npm test
    profiles: [test]
    networks:
      - app_network

volumes:
  db_data:

networks:
  app_network:
    driver: bridge
